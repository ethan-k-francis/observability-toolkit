# Grafana dashboard provisioning configuration.
#
# This tells Grafana where to find dashboard JSON files. On startup,
# Grafana loads all JSON files from the specified path and creates
# the dashboards automatically. Changes to the JSON files are picked
# up every 10 seconds (updateIntervalSeconds).

apiVersion: 1

providers:
  - name: "default"
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    # Grafana polls for dashboard file changes at this interval.
    updateIntervalSeconds: 10
    options:
      # This path maps to the Docker volume mount in docker-compose.yaml:
      # ./grafana/dashboards:/var/lib/grafana/dashboards
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
